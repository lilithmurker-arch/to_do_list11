<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My To-Do List</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card" aria-label="To-do app">
        <header class="header">
          <h1 class="title">My To-Do List</h1>
          <p class="subtitle">Add tasks, then delete when done.</p>
        </header>

        <form class="composer" id="taskForm" autocomplete="off">
          <label class="sr-only" for="taskInput">Task</label>
          <input
            id="taskInput"
            class="input"
            type="text"
            placeholder="e.g., Buy groceries"
            maxlength="120"
          />
          <button class="btn btn-primary" type="submit" id="addTaskBtn">
            Add Task
          </button>
        </form>

        <ul class="list" id="taskList" aria-live="polite" aria-relevant="additions removals"></ul>
      </section>
    </main>

    <script src="script.js" defer></script>
  </body>
</html>
